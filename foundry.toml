[profile.default]
src = "src"
out = "out"
libs = ["lib", "node_modules"]
test = "test"
script = "script"
solc_version = "0.8.30"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read", path = "./" }]
remappings = [
  "@openzeppelin/=node_modules/@openzeppelin/",
  "@somnia-chain/=node_modules/@somnia-chain/",
  "forge-std/=lib/forge-std/src/",
]

[fmt]
line_length = 110
tab_width = 4
bracket_spacing = true
int_types = "long"

[rpc_endpoints]
somnia_testnet = "${SOMNIA_TESTNET_RPC_URL}"
somnia_mainnet = "${SOMNIA_MAINNET_RPC_URL}"
